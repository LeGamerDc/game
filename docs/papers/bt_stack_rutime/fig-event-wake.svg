<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f7f6f1"/>
  <text x="70" y="86" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#24313a">Events and Scheduled Wakeups</text>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#b9c4c8"/>
    </marker>
    <marker id="arrowTeal" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f8b8d"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#16333a" flood-opacity="0.11"/>
    </filter>
  </defs>
    <rect x="80" y="175" width="650" height="600" rx="24" fill="#ffffff" stroke="#b9c4c8" stroke-width="2"/>
    <text x="405" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="500" fill="#6e7b83">Event dispatch follows the active path</text>
    <g filter="url(#shadow)">
    <rect x="245" y="310" width="250" height="64" rx="14" fill="#f8dedb" stroke="#c4514a" stroke-width="3"/>
    <text x="370" y="349" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">Event arrives</text>
  </g>
    <line x1="370" y1="375" x2="370" y2="430" stroke="#c4514a" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <g filter="url(#shadow)">
    <rect x="230" y="445" width="280" height="64" rx="14" fill="#d9f0ef" stroke="#0f8b8d" stroke-width="3"/>
    <text x="370" y="484" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">Root top frame</text>
  </g>
    <line x1="370" y1="510" x2="370" y2="575" stroke="#0f8b8d" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <g filter="url(#shadow)">
    <rect x="185" y="590" width="370" height="64" rx="14" fill="#fff0c2" stroke="#e2a72e" stroke-width="3"/>
    <text x="370" y="629" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">Leaf or sub-root handles it</text>
  </g>
    <rect x="850" y="175" width="650" height="600" rx="24" fill="#ffffff" stroke="#b9c4c8" stroke-width="2"/>
    <text x="1175" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="500" fill="#6e7b83">Deadline wake can be cut short</text>
    <line x1="930" y1="505" x2="1410" y2="505" stroke="#b9c4c8" stroke-width="5" stroke-linecap="round"/>
    <circle cx="930" cy="505" r="13" fill="#0f8b8d"/>
    <circle cx="1140" cy="505" r="13" fill="#c4514a"/>
    <circle cx="1410" cy="505" r="13" fill="#e2a72e"/>
    <text x="930" y="455" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">0s</text>
    <text x="1140" y="455" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">2s</text>
    <text x="1410" y="455" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">5s</text>
    <text x="930" y="565" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">BT returns +5</text>
    <text x="1140" y="565" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">event completes task</text>
    <text x="1410" y="565" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">old wake skipped</text>
    <text x="1175" y="680" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">The tree sleeps until a deadline or a relevant event.</text>
</svg>