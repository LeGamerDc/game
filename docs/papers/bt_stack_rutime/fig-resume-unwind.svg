<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f7f6f1"/>
  <text x="70" y="86" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#24313a">Short-Path Resume and Parent Unwind</text>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#b9c4c8"/>
    </marker>
    <marker id="arrowTeal" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f8b8d"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#16333a" flood-opacity="0.11"/>
    </filter>
  </defs>
    <g filter="url(#shadow)">
    <rect x="90" y="210" width="405" height="228" rx="16" fill="#ffffff" stroke="#0f8b8d" stroke-width="3"/>
    <rect x="90" y="210" width="405" height="56" rx="16" fill="#d9f0ef"/>
    <text x="114" y="247" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">T0 enter</text>
    <text x="120" y="304" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">push Selector</text><text x="120" y="342" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">push Sequence</text><text x="120" y="380" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">push WaitMove</text><text x="120" y="418" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">leaf returns +5</text>
  </g>
    <g filter="url(#shadow)">
    <rect x="600" y="210" width="405" height="152" rx="16" fill="#ffffff" stroke="#e2a72e" stroke-width="3"/>
    <rect x="600" y="210" width="405" height="56" rx="16" fill="#fff0c2"/>
    <text x="624" y="247" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">T5 resume</text>
    <text x="630" y="304" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">run WaitMove only</text><text x="630" y="342" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">leaf returns Success</text>
  </g>
    <g filter="url(#shadow)">
    <rect x="1110" y="210" width="405" height="190" rx="16" fill="#ffffff" stroke="#4d9964" stroke-width="3"/>
    <rect x="1110" y="210" width="405" height="56" rx="16" fill="#dff1e4"/>
    <text x="1134" y="247" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">unwind</text>
    <text x="1140" y="304" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">pop WaitMove</text><text x="1140" y="342" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">Sequence sees Success</text><text x="1140" y="380" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">push Attack</text>
  </g>
    <line x1="500" y1="390" x2="590" y2="390" stroke="#b9c4c8" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="1010" y1="390" x2="1100" y2="390" stroke="#b9c4c8" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
    <rect x="120" y="635" width="1360" height="86" rx="18" fill="#ffffff" stroke="#b9c4c8" stroke-width="2"/>
    <text x="800" y="688" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">The runtime pays the full path cost when entering or changing behavior, not while the leaf is waiting.</text>
</svg>