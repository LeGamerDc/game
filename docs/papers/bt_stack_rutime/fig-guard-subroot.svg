<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f7f6f1"/>
  <text x="70" y="86" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#24313a">Persistent Guard as a Scoped Sub-Root</text>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#b9c4c8"/>
    </marker>
    <marker id="arrowTeal" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f8b8d"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#16333a" flood-opacity="0.11"/>
    </filter>
  </defs>
    <rect x="95" y="200" width="575" height="545" rx="24" fill="#ffffff" stroke="#b9c4c8" stroke-width="2"/>
    <text x="382" y="255" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="500" fill="#6e7b83">Outer continuation</text>
    <g filter="url(#shadow)">
    <rect x="250" y="350" width="300" height="70" rx="14" fill="#d9f0ef" stroke="#0f8b8d" stroke-width="3"/>
    <text x="400" y="389" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">AlwaysGuard frame</text>
  </g>
    <text x="383" y="475" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">guard: target still valid?</text>
    <line x1="383" y1="420" x2="383" y2="455" stroke="#0f8b8d" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <rect x="820" y="200" width="680" height="545" rx="24" fill="#ffffff" stroke="#b9c4c8" stroke-width="2"/>
    <text x="1160" y="255" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="500" fill="#6e7b83">Inner root resumes child behavior</text>
    <g filter="url(#shadow)">
    <rect x="1000" y="345" width="300" height="70" rx="14" fill="#fff0c2" stroke="#e2a72e" stroke-width="3"/>
    <text x="1150" y="384" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">MoveToTarget</text>
  </g>
    <g filter="url(#shadow)">
    <rect x="1030" y="470" width="240" height="64" rx="14" fill="#d9f0ef" stroke="#0f8b8d" stroke-width="3"/>
    <text x="1150" y="509" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">Chase sequence</text>
  </g>
    <g filter="url(#shadow)">
    <rect x="1060" y="590" width="180" height="60" rx="14" fill="#ffffff" stroke="#b9c4c8" stroke-width="3"/>
    <text x="1150" y="629" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">Selector</text>
  </g>
    <line x1="552" y1="385" x2="990" y2="380" stroke="#0f8b8d" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="1150" y1="416" x2="1150" y2="468" stroke="#0f8b8d" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="1150" y1="535" x2="1150" y2="588" stroke="#0f8b8d" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="800" y="805" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">Guard failure cancels the inner root; guard success resumes only the scoped child stack.</text>
</svg>