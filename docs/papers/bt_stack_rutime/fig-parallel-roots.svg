      <path d="M0,0 L10,5 L0,10 z" fill="#b9c4c8"/>
    </marker>
    <marker id="arrowTeal" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f8b8d"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#16333a" flood-opacity="0.11"/>
    </filter>
  </defs>
    <rect x="120" y="175" width="1360" height="615" rx="26" fill="#ffffff" stroke="#b9c4c8" stroke-width="2"/>
    <g filter="url(#shadow)">
    <rect x="160" y="250" width="455" height="190" rx="16" fill="#ffffff" stroke="#0f8b8d" stroke-width="3"/>
    <rect x="160" y="250" width="455" height="56" rx="16" fill="#d9f0ef"/>
    <text x="184" y="287" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">Join frame</text>
    <text x="190" y="344" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">require: 2 successes</text><text x="190" y="382" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">status: [running, running, success]</text><text x="190" y="420" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">cancel remaining roots when done</text>
  </g>
