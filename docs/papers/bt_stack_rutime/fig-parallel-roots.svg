    <text x="824" y="592" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">Child root C</text>
    <text x="830" y="649" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">top: AimAtTarget</text><text x="830" y="687" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">status: Success</text>
  </g>
    <text x="800" y="845" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#24313a">A parallel node does not need one multi-headed stack; it owns several child roots.</text>
