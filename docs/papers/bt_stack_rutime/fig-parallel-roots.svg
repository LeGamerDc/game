    <text x="830" y="309" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">top: WaitAnimation</text><text x="830" y="347" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">next wake: +3</text>
  </g>
    <g filter="url(#shadow)">
