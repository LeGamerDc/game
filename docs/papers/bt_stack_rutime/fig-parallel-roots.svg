    <line x1="620" y1="400" x2="780" y2="430" stroke="#0f8b8d" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="620" y1="435" x2="780" y2="600" stroke="#0f8b8d" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
