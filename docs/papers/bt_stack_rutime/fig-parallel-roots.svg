<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f7f6f1"/>
  <text x="70" y="86" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#24313a">Parallel Branches as Multiple Continuations</text>
  <defs>
