    <text x="830" y="479" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">top: MoveToCover</text><text x="830" y="517" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#6e7b83">next wake: +1</text>
